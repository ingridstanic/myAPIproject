<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <div class="form-container">
        <form id="addProduct">
          <h1>ADD PRODUCT</h1>
          <input id="addTitle" type="text" placeholder="TITLE" required />
          <input
            id="addDescription"
            type="text"
            placeholder="DESPCRIPTION (OPTIONAL)"
          />
          <input id="addPrice" type="number" placeholder="PRICE" required />
          <button>ADD</button>
        </form>
        <form id="updateProduct">
          <h1>UPDATE PRODUCT</h1>
          <input id="title" type="text" placeholder="TITLE" />
          <textarea
            id="description"
            type="text"
            placeholder="DESPCRIPTION (OPTIONAL)"
          >
          </textarea>
          <input id="price" type="number" placeholder="PRICE" />
          <button>UPDATE</button>
        </form>
      </div>

      <form id="productForm">
        <input id="inputText" type="text" placeholder="SEARCH PRODUCTS" />
        <button>SEARCH</button>
        <button id="sortBtn" type="button">SORT</button>
      </form>
      <div id="productContainer" class="product-container"></div>
      <div id="cartContainer"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
